<?xml version="1.0" encoding="UTF-8"?>
<!--
  TaxIQ — horizontal lockup for DARK backgrounds.
  The tile inverts (off-white tile, navy spark) so the mark keeps its
  figure/ground relationship, and the accent lifts to the lighter navy
  used by the dark theme so "IQ" stays legible instead of sinking.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 56" width="200" height="56" role="img" aria-label="TaxIQ">
  <title>TaxIQ</title>

  <!-- Mark -->
  <g transform="translate(4 8) scale(0.625)">
    <path d="M0 0h50a14 14 0 0 1 14 14v36a14 14 0 0 1-14 14H14A14 14 0 0 1 0 50V0Z" fill="#F4F2ED"/>
    <path
      d="M32 12
         C33.1 21.4 42.6 30.9 52 32
         C42.6 33.1 33.1 42.6 32 52
         C30.9 42.6 21.4 33.1 12 32
         C21.4 30.9 30.9 21.4 32 12Z"
      fill="#27477D"/>
  </g>

  <!-- Wordmark -->
  <text
    x="56" y="36"
    font-family="Inter, 'Helvetica Neue', system-ui, sans-serif"
    font-size="24"
    font-weight="600"
    letter-spacing="-0.6"
    fill="#F3F1EB">Tax<tspan fill="#7FA3DC">IQ</tspan></text>
</svg>
