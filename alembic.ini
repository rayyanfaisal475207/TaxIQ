# ============================================================
# Alembic Configuration — TaxIQ
#
# Migration management for PostgreSQL schema changes.
# See: https://alembic.sqlalchemy.org/
# ============================================================

[alembic]
# Path to migration versions directory
script_location = alembic

# Template used to generate migration filenames
file_template = %%(year)d_%%(month).2d_%%(rev)s_%%(slug)s

# Timezone for migration timestamps
timezone = UTC

# Target metadata — defined in env.py, not here
# sqlalchemy.url is set dynamically from DATABASE_URL in env.py

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
